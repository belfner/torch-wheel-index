# Pre-commit hooks for torch-wheel-index
# See https://pre-commit.com for more information
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General file cleanup and validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^tests/fixtures/'
      - id: end-of-file-fixer
        exclude: '^tests/fixtures/'
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [ '--maxkb=1000' ]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [ '--fix=lf' ]
      - id: detect-private-key

  # Python-specific checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: debug-statements

  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      # Run the linter
      - id: ruff
        args: [ --fix ]
      # Run the formatter
      - id: ruff-format
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [ "--profile", "pycharm", "--tc", "--line-length", "120","--treat-all-comment-as-code" ]

# Configuration for specific checks
default_language_version:
  python: python3.12

# Fail fast: stop running hooks after first failure
fail_fast: false

# Exclude patterns
exclude: |
  (?x)^(
      \.git/|
      \.venv/|
      __pycache__/|
      \.pytest_cache/|
      \.mypy_cache/|
      \.ruff_cache/|
      htmlcov/|
      uv\.lock
  )
